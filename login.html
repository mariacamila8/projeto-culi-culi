<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Culi Culi - Login e Cadastro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4d84f;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#ff5b00;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff5b00;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#e24f00;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    color:#ff5b00;
    text-decoration:none;
    cursor:pointer;
}

#cadastro{
    display:none;
}

.mensagem{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

    <!-- LOGIN -->

    <div id="login">

        <h1>Login</h1>

        <input type="email"
        id="loginEmail"
        placeholder="Email">

        <input type="password"
        id="loginSenha"
        placeholder="Senha">

        <button onclick="fazerLogin()">
            Entrar
        </button>

        <div class="link">
            <a onclick="mostrarCadastro()">
                Criar conta
            </a>
        </div>

    </div>

    <!-- CADASTRO -->

    <div id="cadastro">

        <h1>Cadastro</h1>

        <input type="text"
        id="nome"
        placeholder="Nome completo">

        <input type="email"
        id="email"
        placeholder="Email">

        <input type="password"
        id="senha"
        placeholder="Senha">

        <button onclick="cadastrar()">
            Cadastrar
        </button>

        <div class="link">
            <a onclick="mostrarLogin()">
                Já tenho conta
            </a>
        </div>

    </div>

    <div class="mensagem" id="mensagem"></div>

</div>

<script>

function mostrarCadastro(){

    document.getElementById("login")
    .style.display = "none";

    document.getElementById("cadastro")
    .style.display = "block";

}

function mostrarLogin(){

    document.getElementById("cadastro")
    .style.display = "none";

    document.getElementById("login")
    .style.display = "block";

}

function cadastrar(){

    let nome =
    document.getElementById("nome").value;

    let email =
    document.getElementById("email").value;

    let senha =
    document.getElementById("senha").value;

    let usuario = {
        nome:nome,
        email:email,
        senha:senha
    };

    localStorage.setItem(
        email,
        JSON.stringify(usuario)
    );

    document.getElementById("mensagem")
    .innerHTML =
    "✅ Cadastro realizado com sucesso!";

    mostrarLogin();

}

function fazerLogin(){

    let email =
    document.getElementById("loginEmail").value;

    let senha =
    document.getElementById("loginSenha").value;

    let usuario =
    JSON.parse(localStorage.getItem(email));

    if(
        usuario &&
        usuario.senha === senha
    ){

        document.getElementById("mensagem")
        .innerHTML =
        "🎉 Bem-vinda ao Culi Culi, "
        + usuario.nome + "!";

        setTimeout(function(){

            window.location.href =
            "Site Culi Culi.html";

        },2000);

    }else{

        document.getElementById("mensagem")
        .innerHTML =
        "❌ Email ou senha incorretos.";

    }

}

</script>

</body>
</html>
